<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0d0d1a" stroke="#00ff9f" stroke-width="2"/>

  <!-- Cockpit/HUD outer ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#00ff9f" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Crosshair horizontal -->
  <line x1="28" y1="100" x2="60" y2="100" stroke="#00ff9f" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="100" x2="172" y2="100" stroke="#00ff9f" stroke-width="1.5" opacity="0.6"/>

  <!-- Crosshair vertical -->
  <line x1="100" y1="28" x2="100" y2="60" stroke="#00ff9f" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="140" x2="100" y2="172" stroke="#00ff9f" stroke-width="1.5" opacity="0.6"/>

  <!-- Agent core — hexagon -->
  <polygon points="100,62 128,78 128,122 100,138 72,122 72,78"
    fill="#0d0d1a" stroke="#00ff9f" stroke-width="2"/>

  <!-- Inner hex glow -->
  <polygon points="100,72 120,83 120,117 100,128 80,117 80,83"
    fill="#00ff9f" fill-opacity="0.06" stroke="#00ff9f" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Center A lettermark -->
  <text x="100" y="113" text-anchor="middle" font-family="monospace" font-size="36"
    font-weight="bold" fill="#00ff9f" letter-spacing="-1">A</text>

  <!-- Corner tick marks -->
  <line x1="48" y1="52" x2="58" y2="62" stroke="#00ccff" stroke-width="1.5" opacity="0.7"/>
  <line x1="152" y1="52" x2="142" y2="62" stroke="#00ccff" stroke-width="1.5" opacity="0.7"/>
  <line x1="48" y1="148" x2="58" y2="138" stroke="#00ccff" stroke-width="1.5" opacity="0.7"/>
  <line x1="152" y1="148" x2="142" y2="138" stroke="#00ccff" stroke-width="1.5" opacity="0.7"/>

  <!-- Pulse dot top right -->
  <circle cx="142" cy="58" r="3" fill="#00ff9f" opacity="0.9"/>
  <circle cx="142" cy="58" r="6" fill="none" stroke="#00ff9f" stroke-width="1" opacity="0.4"/>
</svg>
